<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acadie Tuner</title>
<style>
  body { font-family: sans-serif; background-color: #f0f0f0; margin:0; padding:0; }

  /* Pop-up */
  #popup {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center;
  }
  #popup-content {
    background: #fff; padding: 20px; border-radius: 10px; text-align:center;
  }
  #btn-start {
    background-color: #ff9999; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;
  }

  /* Menu instruments */
  #instrument-menu { display:none; margin: 20px; text-align:center;}
  #instrument-menu button { margin: 10px; padding: 10px 20px; cursor:pointer; border-radius:5px; }

  /* Barre de tuner */
  #tuner-bar {
    display:none;
    position: relative;
    margin: 20px auto;
    background-color: #ddd;
    height: 20px;
    width: 80%;
    border-radius: 10px;
  }
  #tuner-cursor {
    position: absolute;
    height: 20px;
    width: 10px;
    background-color: #ff6666;
    border-radius: 5px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* Notes */
  #note-display { text-align: center; margin-top: 10px; }
  .note { display:inline-block; padding:5px 10px; margin:0 5px; background:#ffcccc; border-radius:5px; font-weight:bold; }
  .note.active { background:#ff6666; color:#fff; }
  .note.correct { background-color: #4CAF50; color: #fff; }
</style>
</head>
<body>

<!-- Pop-up -->
<div id="popup">
  <div id="popup-content">
    <h2>Bienvenue sur Acadie Tuner</h2>
    <p>Application créée par Martin Duguay</p>
    <button id="btn-start">Commencer</button>
  </div>
</div>

<!-- Menu instruments -->
<div id="instrument-menu">
  <button id="btn-guitare">Guitare acoustique</button>
  <button id="btn-ukulele">Ukulélé</button>
</div>

<!-- Barre de tuner -->
<div id="tuner-bar">
  <div id="tuner-cursor"></div>
</div>
<div id="note-display"></div>

<script src="app.js"></script>
</body>
</html>
